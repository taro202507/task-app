name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build task-app
        working-directory: task-app
        run: |
          npm ci
          npm run build

      - name: Build staff-app
        working-directory: staff-app
        run: |
          npm ci
          npm run build

      - name: Build wordcloud-app
        working-directory: wordcloud-app
        run: |
          npm ci
          npm run build

      - name: Combine dist for GitHub Pages
        run: |
          mkdir -p deploy/staff-app deploy/wordcloud-app
          cp -r task-app/dist/* deploy/
          cp -r staff-app/dist/* deploy/staff-app/
          cp -r wordcloud-app/dist/* deploy/wordcloud-app/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
